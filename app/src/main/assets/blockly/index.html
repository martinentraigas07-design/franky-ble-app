<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Franky 4.0 - Bloques</title>
<style>
  :root {
    --bg: #0d0d0d; --bg2: #1a1a1a; --bg3: #222; --bg4: #2a2a2a;
    --acc: #e05a00; --acc2: #ff7a1a; --ok: #00c853;
    --danger: #e53935; --warn: #ffa000; --txt: #e0e0e0; --txt2: #999; --brd: #333;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: var(--bg); overflow: hidden; }

  #blocklyDiv {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  /* Notification toast — mirrors .notif from bloques.html */
  #notif {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    color: #fff;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Segoe UI', Arial, sans-serif;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    white-space: nowrap;
  }

  /* Blockly toolbox styling — dark theme matching web server */
  .blocklyTreeLabel {
    color: #ffffff !important;
    font-size: 13px !important;
    font-weight: 600 !important;
    font-family: 'Segoe UI', Arial, sans-serif !important;
  }
  .blocklyTreeRow:hover .blocklyTreeLabel { color: #ffcc80 !important; }
  .blocklyTreeSelected .blocklyTreeLabel { color: #ffcc80 !important; }
  .blocklyFlyoutLabelText { fill: #ffffff !important; }
  .blocklyToolboxDiv {
    background: #16213e !important;
    border-right: 1px solid #333 !important;
  }
  .blocklyFlyout { background-color: #1e2a45 !important; }
  .blocklyScrollbarBackground { fill: #1a1a1a !important; }
  .blocklyScrollbarHandle { fill: #444 !important; }
  .blocklyMainBackground { fill: #1a1a1a !important; }
  .blocklyGrid pattern line { stroke: #333 !important; }
</style>
</head>
<body>

<div id="blocklyDiv"></div>
<div id="notif"></div>

<script src="bly_core_1.js"></script>
<script src="bly_core_2.js"></script>
<script src="bly_core_3.js"></script>
<script src="bly_core_4.js"></script>
<script src="bly_core_5.js"></script>
<script src="bly_blocks.js"></script>
<script src="bly_js.js"></script>
<script src="bly_msg.js"></script>

<script>
// ── Toolbox definition — mirrors bloques.html categories ──────────────────
var TOOLBOX = {
  kind: 'categoryToolbox',
  contents: [
    {
      kind: 'category', name: 'Movimiento', colour: 160,
      contents: [
        { kind: 'block', type: 'franky_adelante' },
        { kind: 'block', type: 'franky_atras' },
        { kind: 'block', type: 'franky_izquierda' },
        { kind: 'block', type: 'franky_derecha' },
        { kind: 'block', type: 'franky_stop' },
        { kind: 'block', type: 'franky_velocidad' }
      ]
    },
    {
      kind: 'category', name: 'Sensores', colour: 210,
      contents: [
        { kind: 'block', type: 'franky_leer_adc' },
        { kind: 'block', type: 'franky_leer_temp' },
        { kind: 'block', type: 'franky_leer_hum' }
      ]
    },
    {
      kind: 'category', name: 'Control', colour: 120,
      contents: [
        { kind: 'block', type: 'controls_repeat_ext' },
        { kind: 'block', type: 'controls_whileUntil' },
        { kind: 'block', type: 'controls_if' },
        { kind: 'block', type: 'controls_ifelse' }
      ]
    },
    {
      kind: 'category', name: 'Lógica', colour: 210,
      contents: [
        { kind: 'block', type: 'logic_compare' },
        { kind: 'block', type: 'logic_operation' },
        { kind: 'block', type: 'logic_negate' },
        { kind: 'block', type: 'logic_boolean' }
      ]
    },
    {
      kind: 'category', name: 'Matemáticas', colour: 230,
      contents: [
        { kind: 'block', type: 'math_number' },
        { kind: 'block', type: 'math_arithmetic' },
        { kind: 'block', type: 'math_single' }
      ]
    },
    {
      kind: 'category', name: 'Tiempo', colour: 65,
      contents: [
        { kind: 'block', type: 'franky_esperar' }
      ]
    },
    {
      kind: 'sep'
    },
    {
      kind: 'category', name: 'Variables', colour: 330,
      custom: 'VARIABLE'
    },
    {
      kind: 'category', name: 'Funciones', colour: 290,
      custom: 'PROCEDURE'
    }
  ]
};

// ── Custom FRANKY blocks ───────────────────────────────────────────────────
Blockly.defineBlocksWithJsonArray([
  {
    type: 'franky_adelante',
    message0: '🤖 Avanzar',
    previousStatement: null, nextStatement: null,
    colour: 160,
    tooltip: 'FRANKY avanza hacia adelante'
  },
  {
    type: 'franky_atras',
    message0: '🤖 Retroceder',
    previousStatement: null, nextStatement: null,
    colour: 160,
    tooltip: 'FRANKY retrocede'
  },
  {
    type: 'franky_izquierda',
    message0: '🤖 Girar izquierda',
    previousStatement: null, nextStatement: null,
    colour: 160,
    tooltip: 'FRANKY gira a la izquierda'
  },
  {
    type: 'franky_derecha',
    message0: '🤖 Girar derecha',
    previousStatement: null, nextStatement: null,
    colour: 160,
    tooltip: 'FRANKY gira a la derecha'
  },
  {
    type: 'franky_stop',
    message0: '⬛ Detener FRANKY',
    previousStatement: null, nextStatement: null,
    colour: 0,
    tooltip: 'Detiene todos los motores'
  },
  {
    type: 'franky_velocidad',
    message0: '⚡ Velocidad %1',
    args0: [{ type: 'field_number', name: 'SPD', value: 200, min: 0, max: 255 }],
    previousStatement: null, nextStatement: null,
    colour: 160,
    tooltip: 'Ajusta la velocidad (0–255)'
  },
  {
    type: 'franky_leer_adc',
    message0: '📊 Leer ADC0',
    output: 'Number',
    colour: 210,
    tooltip: 'Lee el valor del sensor analógico ADC0'
  },
  {
    type: 'franky_leer_temp',
    message0: '🌡 Temperatura (°C)',
    output: 'Number',
    colour: 210,
    tooltip: 'Lee la temperatura del sensor DHT22'
  },
  {
    type: 'franky_leer_hum',
    message0: '💧 Humedad (%)',
    output: 'Number',
    colour: 210,
    tooltip: 'Lee la humedad del sensor DHT22'
  },
  {
    type: 'franky_esperar',
    message0: '⏱ Esperar %1 ms',
    args0: [{ type: 'field_number', name: 'MS', value: 500, min: 0 }],
    previousStatement: null, nextStatement: null,
    colour: 65,
    tooltip: 'Espera N milisegundos'
  }
]);

// ── Workspace ──────────────────────────────────────────────────────────────
var workspace = Blockly.inject('blocklyDiv', {
  toolbox: TOOLBOX,
  grid: { spacing: 20, length: 3, colour: '#333', snap: true },
  trashcan: true,
  scrollbars: true,
  zoom: { controls: true, wheel: true, startScale: 0.9, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 },
  theme: {
    base: Blockly.Themes.Classic,
    componentStyles: {
      workspaceBackgroundColour: '#1a1a1a',
      toolboxBackgroundColour: '#16213e',
      toolboxForegroundColour: '#ffffff',
      flyoutBackgroundColour: '#1e2a45',
      flyoutForegroundColour: '#ffffff',
      flyoutOpacity: 1,
      scrollbarColour: '#444',
      insertionMarkerColour: '#ff7a1a',
      insertionMarkerOpacity: 0.3,
      scrollbarOpacity: 0.4,
      cursorColour: '#ff7a1a'
    }
  }
});

// ── Block count reporting ──────────────────────────────────────────────────
workspace.addChangeListener(function(e) {
  var count = workspace.getAllBlocks(false).length;
  if (window.AndroidInterface && AndroidInterface.updateBlockCount) {
    AndroidInterface.updateBlockCount(count);
  }
});

// ── Public API called by Android ──────────────────────────────────────────

/** Called by Android's evaluateJavascript — returns XML string */
function getXmlForAndroid() {
  var xml = Blockly.Xml.workspaceToDom(workspace);
  return new XMLSerializer().serializeToString(xml);
}

/** Called by btnSendBlockly button in Android layout (direct bridge) */
function enviarCodigo() {
  var xml = Blockly.Xml.workspaceToDom(workspace);
  var xmlStr = new XMLSerializer().serializeToString(xml);
  if (window.AndroidInterface) {
    AndroidInterface.enviar(xmlStr);
  }
}

/** Show toast notification — called from Android via evaluateJavascript */
function showNotif(msg, color) {
  var n = document.getElementById('notif');
  n.textContent = msg;
  n.style.backgroundColor = color || '#333';
  n.style.opacity = '1';
  clearTimeout(n._timer);
  n._timer = setTimeout(function() { n.style.opacity = '0'; }, 3000);
}
</script>
</body>
</html>
