<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Franky 4.0 — Programación</title>
<style>
:root {
  --bg:#0d0d0d;--bg2:#1a1a1a;--bg3:#222;
  --acc:#e05a00;--acc2:#ff7a1a;
  --ok:#00c853;--danger:#e53935;--warn:#ffa000;
  --txt:#e0e0e0;--txt2:#999;--brd:#333;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg)}
#blocklyDiv{position:absolute;top:0;left:0;right:0;bottom:0}
#notif{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  padding:10px 22px;color:#fff;border-radius:8px;
  font:700 14px/1 'Segoe UI',Arial,sans-serif;
  z-index:9999;opacity:0;transition:opacity .4s;
  pointer-events:none;white-space:nowrap;max-width:90vw}
#loading{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
  background:var(--bg);z-index:9000;
  color:var(--txt);font:14px 'Segoe UI',sans-serif}
#ld{width:40px;height:40px;border-radius:50%;
  border:4px solid #333;border-top-color:var(--acc);
  animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Blockly dark theme overrides */
.blocklyTreeLabel{color:#fff!important;font:600 13px 'Segoe UI',sans-serif!important}
.blocklyTreeRow:hover .blocklyTreeLabel,.blocklyTreeSelected .blocklyTreeLabel{color:#ffcc80!important}
.blocklyFlyoutLabelText{fill:#fff!important}
.blocklyToolboxDiv{background:#16213e!important;border-right:1px solid #333!important}
.blocklyFlyout{background:#1e2a45!important}
.blocklyScrollbarBackground{fill:#1a1a1a!important}
.blocklyScrollbarHandle{fill:#555!important}
.blocklyMainBackground{fill:#1a1a1a!important}
</style>
</head>
<body>
<div id="loading"><div id="ld"></div><span>Cargando Blockly…</span></div>
<div id="blocklyDiv"></div>
<div id="notif"></div>

<!--
  ARCHIVOS REQUERIDOS EN app/src/main/assets/blockly/
  (mismos del proyecto SPIFFS ESP32):
    bly_core_1.js  bly_core_2.js  bly_core_3.js  bly_core_4.js  bly_core_5.js
    bly_blocks.js  bly_js.js  bly_msg.js
-->
<script src="bly_core_1.js"></script>
<script src="bly_core_2.js"></script>
<script src="bly_core_3.js"></script>
<script src="bly_core_4.js"></script>
<script src="bly_core_5.js"></script>
<script src="bly_blocks.js"></script>
<script src="bly_js.js"></script>
<script src="bly_msg.js"></script>

<script>
(function(){
'use strict';

/* ── Android bridge ─────────────────────────────────────────────────── */
function android(m,a){
  if(typeof AndroidInterface!=='undefined'&&typeof AndroidInterface[m]==='function')
    AndroidInterface[m](a!==undefined?String(a):'');
}
function hideLoading(){var e=document.getElementById('loading');if(e)e.style.display='none';}

/* ── Guard ───────────────────────────────────────────────────────────── */
if(typeof Blockly==='undefined'){
  hideLoading();
  document.getElementById('blocklyDiv').innerHTML=
    '<div style="padding:24px;color:#e53935;font:14px/1.8 monospace">'
    +'<b>ERROR: Blockly no cargó.</b><br><br>'
    +'Archivos requeridos en <code>app/src/main/assets/blockly/</code>:<br>'
    +'<br>• bly_core_1.js … bly_core_5.js<br>• bly_blocks.js<br>• bly_js.js<br>• bly_msg.js'
    +'</div>';
  android('logError','Blockly undefined – bly_*.js missing');
  return;
}

/* ══════════════════════════════════════════════════════════════════════
   BLOQUE DEFINITIONS — All categories requested
   ══════════════════════════════════════════════════════════════════════ */
Blockly.defineBlocksWithJsonArray([

  /* ── MOTORES ─────────────────────────────────────────────────── */
  {type:'franky_adelante',message0:'🤖 Avanzar',
   previousStatement:null,nextStatement:null,colour:160,tooltip:'Avanza (F)'},
  {type:'franky_atras',message0:'🤖 Retroceder',
   previousStatement:null,nextStatement:null,colour:160,tooltip:'Retrocede (B)'},
  {type:'franky_izquierda',message0:'🤖 Girar izquierda',
   previousStatement:null,nextStatement:null,colour:160},
  {type:'franky_derecha',message0:'🤖 Girar derecha',
   previousStatement:null,nextStatement:null,colour:160},
  {type:'franky_stop',message0:'⬛ Detener motores',
   previousStatement:null,nextStatement:null,colour:0,tooltip:'Para los motores (S)'},
  {type:'franky_velocidad',
   message0:'⚡ Velocidad %1',
   args0:[{type:'field_number',name:'SPD',value:200,min:0,max:255}],
   previousStatement:null,nextStatement:null,colour:160,tooltip:'Ajusta velocidad 0–255'},

  /* ── LED ─────────────────────────────────────────────────────── */
  {type:'franky_led_on', message0:'💡 LED encender',
   previousStatement:null,nextStatement:null,colour:65},
  {type:'franky_led_off',message0:'💡 LED apagar',
   previousStatement:null,nextStatement:null,colour:65},
  {type:'franky_led_pwm',
   message0:'💡 LED brillo %1 %',
   args0:[{type:'field_number',name:'PCT',value:50,min:0,max:100}],
   previousStatement:null,nextStatement:null,colour:65,tooltip:'Brillo LED 0-100%'},

  /* ── TIEMPO ──────────────────────────────────────────────────── */
  {type:'franky_esperar',
   message0:'⏱ Esperar %1 ms',
   args0:[{type:'field_number',name:'MS',value:500,min:1}],
   previousStatement:null,nextStatement:null,colour:65,tooltip:'Pausa en milisegundos'},

  /* ── SENSORES ANALÓGICOS ──────────────────────────────────────── */
  {type:'franky_leer_adc0',message0:'📊 Leer ADC0 (GPIO0)',
   output:'Number',colour:210,tooltip:'0–4095, GPIO0'},
  {type:'franky_leer_adc1',message0:'📊 Leer ADC1 (GPIO1)',
   output:'Number',colour:210,tooltip:'0–4095, GPIO1'},
  {type:'franky_map_adc',
   message0:'🔁 Mapear %1 de [0,4095] → [%2, %3]',
   args0:[
     {type:'input_value',name:'VAL',check:'Number'},
     {type:'field_number',name:'LO',value:0},
     {type:'field_number',name:'HI',value:255}
   ],
   output:'Number',colour:230,tooltip:'Equivalente a map() de Arduino'},

  /* ── SENSORES DIGITALES ──────────────────────────────────────── */
  {type:'franky_leer_boton',message0:'🔘 Botón Start (GPIO9)',
   output:'Boolean',colour:210,tooltip:'true = presionado'},
  {type:'franky_leer_gpio',
   message0:'🔌 Leer GPIO %1',
   args0:[{type:'field_dropdown',name:'PIN',
     options:[['GPIO6','6'],['GPIO7','7'],['GPIO9','9'],['GPIO10','10'],
              ['GPIO20','20'],['GPIO21','21']]}],
   output:'Boolean',colour:210,tooltip:'Leer pin digital'},
  {type:'franky_gpio_out',
   message0:'🔌 Poner GPIO %1 → %2',
   args0:[
     {type:'field_dropdown',name:'PIN',
       options:[['GPIO6','6'],['GPIO7','7'],['GPIO9','9'],['GPIO10','10'],
                ['GPIO20','20'],['GPIO21','21']]},
     {type:'field_dropdown',name:'VAL',options:[['HIGH','1'],['LOW','0']]}
   ],
   previousStatement:null,nextStatement:null,colour:210},

  /* ── SONAR HC-SR04 ──────────────────────────────────────────── */
  {type:'franky_sonar_cm',
   message0:'📡 Sonar TRIG %1 ECHO %2 (cm)',
   args0:[
     {type:'field_dropdown',name:'TRIG',
       options:[['GPIO20','20'],['GPIO21','21'],['GPIO6','6'],['GPIO7','7'],['GPIO10','10']]},
     {type:'field_dropdown',name:'ECHO',
       options:[['GPIO21','21'],['GPIO20','20'],['GPIO7','7'],['GPIO6','6'],['GPIO10','10']]}
   ],
   output:'Number',colour:20,tooltip:'Distancia en cm, 2–400 cm'},

  /* ── SENSOR IR SHARP / jSumo ──────────────────────────────────── */
  {type:'franky_ir_sharp',
   message0:'🔴 Sharp GP2Y %1 (0-4095)',
   args0:[{type:'field_dropdown',name:'PIN',
     options:[['ADC0 GPIO0','0'],['ADC1 GPIO1','1']]}],
   output:'Number',colour:20,
   tooltip:'Lee sensor Sharp GP2Y0A21 / GP2Y0A02. Salida analógica 0-4095. Convierte con mapa.'},
  {type:'franky_ir_digital',
   message0:'🔴 IR digital %1 detecta obstáculo',
   args0:[{type:'field_dropdown',name:'PIN',
     options:[['GPIO6','6'],['GPIO7','7'],['GPIO9','9'],['GPIO10','10'],
              ['GPIO20','20'],['GPIO21','21']]}],
   output:'Boolean',colour:20,
   tooltip:'Sensor IR digital tipo jSumo / TCRT5000 / CNY70. LOW = objeto detectado (pull-up)'},

  /* ── I2C / OLED ──────────────────────────────────────────────── */
  {type:'franky_i2c_habilitar',message0:'🔗 Habilitar I2C (GPIO6/7)',
   previousStatement:null,nextStatement:null,colour:290,tooltip:'Wire.begin(6,7)'},
  {type:'franky_oled_texto',
   message0:'📺 OLED mostrar "%1" en fila %2',
   args0:[
     {type:'field_input',name:'TXT',text:'Hola!'},
     {type:'field_number',name:'ROW',value:0,min:0,max:7}
   ],
   previousStatement:null,nextStatement:null,colour:290,tooltip:'Requiere OLED SSD1306 en I2C'},
  {type:'franky_oled_limpiar',message0:'📺 OLED limpiar pantalla',
   previousStatement:null,nextStatement:null,colour:290},

  /* ── SPI / ADC EXTERNO ───────────────────────────────────────── */
  {type:'franky_spi_habilitar',message0:'🔗 Habilitar SPI',
   previousStatement:null,nextStatement:null,colour:330,tooltip:'GPIO20=CLK,21=MOSI,1=MISO,10=CS'},
  {type:'franky_spi_adc',
   message0:'📈 SPI ADC 12-bit canal %1',
   args0:[{type:'field_number',name:'CH',value:0,min:0,max:7}],
   output:'Number',colour:330,tooltip:'Lee ADC SPI MCP3208/ADS1115, 0–4095'}

]);

/* ── JavaScript generators ───────────────────────────────────────────
   These generate the JSON steps that the ViewModel converts.
   We produce JSON-compatible strings as JS output — not evaluated,
   just used by getXmlForAndroid() which returns the XML that
   RobotViewModel.xmlToJson() converts to the firmware protocol.
   ─────────────────────────────────────────────────────────────────── */
if(Blockly.JavaScript){
  var J=Blockly.JavaScript;
  J['franky_adelante']  =function(){return'robot.send("F");\n'};
  J['franky_atras']     =function(){return'robot.send("B");\n'};
  J['franky_izquierda'] =function(){return'robot.send("L");\n'};
  J['franky_derecha']   =function(){return'robot.send("R");\n'};
  J['franky_stop']      =function(){return'robot.send("S");\n'};
  J['franky_velocidad'] =function(b){return'robot.send("SPD:'+b.getFieldValue('SPD')+'");\n'};
  J['franky_led_on']    =function(){return'robot.send("LED:ON");\n'};
  J['franky_led_off']   =function(){return'robot.send("LED:OFF");\n'};
  J['franky_led_pwm']   =function(b){return'robot.send("LED:PWM:'+b.getFieldValue('PCT')+'");\n'};
  J['franky_esperar']   =function(b){return'robot.wait('+b.getFieldValue('MS')+');\n'};
  J['franky_leer_adc0'] =function(){return['robot.adc(0)',J.ORDER_FUNCTION_CALL]};
  J['franky_leer_adc1'] =function(){return['robot.adc(1)',J.ORDER_FUNCTION_CALL]};
  J['franky_leer_boton']=function(){return['robot.btn()',J.ORDER_FUNCTION_CALL]};
  J['franky_leer_gpio'] =function(b){return['robot.gpio('+b.getFieldValue('PIN')+')',J.ORDER_FUNCTION_CALL]};
  J['franky_gpio_out']  =function(b){return'robot.gpioOut('+b.getFieldValue('PIN')+','+b.getFieldValue('VAL')+');\n'};
  J['franky_sonar_cm']  =function(b){return['robot.sonar('+b.getFieldValue('TRIG')+','+b.getFieldValue('ECHO')+')',J.ORDER_FUNCTION_CALL]};
  J['franky_ir_sharp']  =function(b){return['robot.adc('+b.getFieldValue('PIN')+')',J.ORDER_FUNCTION_CALL]};
  J['franky_ir_digital']=function(b){return['robot.gpio('+b.getFieldValue('PIN')+')',J.ORDER_FUNCTION_CALL]};
  J['franky_map_adc']   =function(b){
    var v=J.valueToCode(b,'VAL',J.ORDER_NONE)||'0';
    var lo=b.getFieldValue('LO'),hi=b.getFieldValue('HI');
    return['robot.map('+v+',0,4095,'+lo+','+hi+')',J.ORDER_FUNCTION_CALL];
  };
  J['franky_i2c_habilitar']=function(){return'robot.send("I2C:1");\n'};
  J['franky_oled_texto']   =function(b){return'robot.oled("'+b.getFieldValue('TXT')+'",'+b.getFieldValue('ROW')+');\n'};
  J['franky_oled_limpiar'] =function(){return'robot.oledClear();\n'};
  J['franky_spi_habilitar']=function(){return'robot.send("SPI:1");\n'};
  J['franky_spi_adc']      =function(b){return['robot.spiAdc('+b.getFieldValue('CH')+')',J.ORDER_FUNCTION_CALL]};
}

/* ── Toolbox ─────────────────────────────────────────────────────────── */
var TOOLBOX={kind:'categoryToolbox',contents:[
  {kind:'category',name:'🤖 Motores',colour:160,contents:[
    {kind:'block',type:'franky_adelante'},
    {kind:'block',type:'franky_atras'},
    {kind:'block',type:'franky_izquierda'},
    {kind:'block',type:'franky_derecha'},
    {kind:'block',type:'franky_stop'},
    {kind:'block',type:'franky_velocidad'}
  ]},
  {kind:'category',name:'💡 LED',colour:65,contents:[
    {kind:'block',type:'franky_led_on'},
    {kind:'block',type:'franky_led_off'},
    {kind:'block',type:'franky_led_pwm'},
    {kind:'block',type:'franky_esperar'}
  ]},
  {kind:'category',name:'📡 Sensores',colour:20,contents:[
    {kind:'block',type:'franky_leer_adc0'},
    {kind:'block',type:'franky_leer_adc1'},
    {kind:'block',type:'franky_map_adc'},
    {kind:'block',type:'franky_leer_boton'},
    {kind:'block',type:'franky_leer_gpio'},
    {kind:'block',type:'franky_sonar_cm'},
    {kind:'block',type:'franky_ir_sharp'},
    {kind:'block',type:'franky_ir_digital'}
  ]},
  {kind:'category',name:'🔌 GPIO',colour:210,contents:[
    {kind:'block',type:'franky_gpio_out'},
    {kind:'block',type:'franky_leer_gpio'}
  ]},
  {kind:'category',name:'🔗 I2C / OLED',colour:290,contents:[
    {kind:'block',type:'franky_i2c_habilitar'},
    {kind:'block',type:'franky_oled_texto'},
    {kind:'block',type:'franky_oled_limpiar'}
  ]},
  {kind:'category',name:'📈 SPI / ADC',colour:330,contents:[
    {kind:'block',type:'franky_spi_habilitar'},
    {kind:'block',type:'franky_spi_adc'}
  ]},
  {kind:'category',name:'🔁 Control',colour:120,contents:[
    {kind:'block',type:'controls_repeat_ext',
      inputs:{TIMES:{shadow:{type:'math_number',fields:{NUM:5}}}}},
    {kind:'block',type:'controls_for',
      inputs:{
        FROM:{shadow:{type:'math_number',fields:{NUM:1}}},
        TO:{shadow:{type:'math_number',fields:{NUM:10}}},
        BY:{shadow:{type:'math_number',fields:{NUM:1}}}
      }},
    {kind:'block',type:'controls_whileUntil'},
    {kind:'block',type:'controls_if'},
    {kind:'block',type:'controls_ifelse'},
    {kind:'block',type:'controls_flow_statements'}
  ]},
  {kind:'category',name:'⚖️ Lógica',colour:210,contents:[
    {kind:'block',type:'logic_compare'},
    {kind:'block',type:'logic_operation'},
    {kind:'block',type:'logic_negate'},
    {kind:'block',type:'logic_boolean'}
  ]},
  {kind:'category',name:'🔢 Matemáticas',colour:230,contents:[
    {kind:'block',type:'math_number'},
    {kind:'block',type:'math_arithmetic'},
    {kind:'block',type:'math_single'},
    {kind:'block',type:'math_constrain'},
    {kind:'block',type:'math_map'}
  ]},
  {kind:'sep'},
  {kind:'category',name:'📦 Variables',colour:330,custom:'VARIABLE'},
  {kind:'category',name:'🔧 Funciones',colour:290,custom:'PROCEDURE'}
]};

/* ── Inject workspace ────────────────────────────────────────────────── */
var workspace;
try{
  workspace=Blockly.inject('blocklyDiv',{
    toolbox:TOOLBOX,
    grid:{spacing:20,length:3,colour:'#333',snap:true},
    trashcan:true,
    scrollbars:true,
    zoom:{controls:true,wheel:true,startScale:0.9,maxScale:3,minScale:0.3,scaleSpeed:1.2},
    theme:{
      base:Blockly.Themes?Blockly.Themes.Classic:undefined,
      componentStyles:{
        workspaceBackgroundColour:'#1a1a1a',
        toolboxBackgroundColour:'#16213e',
        toolboxForegroundColour:'#ffffff',
        flyoutBackgroundColour:'#1e2a45',
        flyoutForegroundColour:'#ffffff',
        flyoutOpacity:1,
        scrollbarColour:'#555',
        insertionMarkerColour:'#ff7a1a',
        insertionMarkerOpacity:0.3,
        cursorColour:'#ff7a1a'
      }
    }
  });
}catch(e){
  hideLoading();
  android('logError','Blockly.inject failed: '+e.message);
  return;
}

hideLoading();

/* ── Block count reporting ───────────────────────────────────────────── */
workspace.addChangeListener(function(){
  android('updateBlockCount',workspace.getAllBlocks(false).length);
});

/* ── Resize ─────────────────────────────────────────────────────────── */
window.resizeBlockly=function(){if(workspace)Blockly.svgResize(workspace);};
window.addEventListener('resize',window.resizeBlockly);

/* ── Public API ──────────────────────────────────────────────────────── */

/** Called by Android: evaluateJavascript("getXmlForAndroid()") */
window.getXmlForAndroid=function(){
  if(!workspace)return'';
  try{return new XMLSerializer().serializeToString(Blockly.Xml.workspaceToDom(workspace));}
  catch(e){android('logError','getXml: '+e.message);return'';}
};

/** Called by CARGAR button fallback */
window.enviarCodigo=function(){
  android('enviar',window.getXmlForAndroid());
};

/** Toast notification from Android */
window.showNotif=function(msg,color){
  var n=document.getElementById('notif');
  if(!n)return;
  n.textContent=msg;n.style.backgroundColor=color||'#333';n.style.opacity='1';
  clearTimeout(n._t);n._t=setTimeout(function(){n.style.opacity='0';},3000);
};

android('onEditorReady','');

})();
</script>
</body>
</html>
